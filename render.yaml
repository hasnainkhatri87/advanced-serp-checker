services:
  - type: web
    name: advanced-serp-checker
    runtime: node
    plan: free
    buildCommand: npm run check && npm test
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: SERPER_API_KEY
        sync: false
      - key: RATE_LIMIT_PER_MINUTE
        value: 30
